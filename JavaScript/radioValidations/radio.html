<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Validation</title>
</head>
<body>
    <form style="display: flex;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    border: 2px solid red;
    padding: 1rem;" name="myRadio" onsubmit="handleSubmit(event)">
<label for="male">Male</label>
<input type="radio" name="content" id="male" value="male">    
<label for="female">Female</label>
<input type="radio" name="content" id="female" value="female">    
<label for="gmail">Gmail</label>
<input type="radio" name="content" id="gmail" value="Others"> 
<input type="submit" value="submit">   
</form>
<span id="output"></span>
</body>
<script src="./index.js"></script>
</html>
